<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔐 WhatsApp AES Sécurisé (Simulation Exposé)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1e2937;
            padding: 15px;
            text-align: center;
            color: #22d3ee;
            font-size: 1.25rem;
        }
        .key-area {
            background: #1e2937;
            padding: 10px;
            text-align: center;
        }
        .key-area input {
            width: 80%;
            max-width: 280px;
            padding: 8px;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        .messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0a1625;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 1rem;
            word-break: break-word;
        }
        .me { align-self: flex-end; background: #22d3ee; color: #0f172a; }
        .other { align-self: flex-start; background: #1e2937; color: #e2e8f0; }
        .encrypted { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; word-break: break-word; }
        .input-area {
            background: #1e2937;
            padding: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            min-width: 60%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            outline: none;
            background: #334155;
            color: white;
        }
        .input-area button {
            flex-shrink: 0;
            padding: 14px 20px;
            border-radius: 30px;
            background: #22d3ee;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .decrypt-btn {
            background: #f472b6;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 8px;
            border: none;
            cursor: pointer;
        }

        /* Media query pour petit écran */
        @media (max-width: 480px) {
            .message { max-width: 90%; font-size: 0.95rem; }
            .input-area input { min-width: 55%; }
            header { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<header>🔐 WhatsApp AES Sécurisé (Simulation Exposé)</header>

<div class="key-area">
    Clé secrète : 
    <input id="key" type="text" value="1234567890123456">
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
    <input id="messageInput" type="text" placeholder="Tape ton message ici...">
    <button onclick="sendMessage()">Chiffrer & Envoyer</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="script.js"></script>
</body>
</html>
