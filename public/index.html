<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp AES 🔐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Roboto', sans-serif; 
            background: #0f172a; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        header { 
            background: #075E54; 
            color: white; 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 18px;
        }
        .messages { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            background: #0a1625 url('https://i.imgur.com/5y3q2.png') repeat; 
            background-size: cover; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }
        .message { 
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 18px; 
            font-size: 16px; 
            line-height: 1.4;
        }
        .me { 
            align-self: flex-end; 
            background: #DCF8C6; 
            color: #111; 
            border-bottom-right-radius: 4px;
        }
        .other { 
            align-self: flex-start; 
            background: #1e2937; 
            color: white; 
            border-bottom-left-radius: 4px;
        }
        .encrypted { 
            font-size: 13px; 
            color: #666; 
            word-break: break-all; 
            margin-top: 4px;
        }
        .time { 
            font-size: 11px; 
            color: #777; 
            text-align: right; 
            margin-top: 4px;
        }
        .input-area { 
            background: #075E54; 
            padding: 10px; 
            display: flex; 
            gap: 8px;
        }
        input { 
            flex: 1; 
            padding: 14px 18px; 
            border: none; 
            border-radius: 30px; 
            background: #ffffff; 
            font-size: 16px;
        }
        button { 
            background: #25D366; 
            color: white; 
            border: none; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .decrypt-btn { 
            background: #f472b6; 
            color: white; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 14px; 
            margin-top: 6px;
        }
        /* Scrollbar sympa sur mobile */
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #25D366; border-radius: 20px; }
    </style>
</head>
<body>

<header>
    🔐 WhatsApp AES Sécurisé
</header>

<div class="messages" id="messages"></div>

<div class="input-area">
    <input id="messageInput" type="text" placeholder="Tape ton message...">
    <button onclick="sendMessage()">➤</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="script.js"></script>

</body>
</html>
