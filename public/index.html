<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔐 WhatsApp AES Sécurisé (Simulation Exposé)</title>
    <style>
        body { margin:0; font-family:Arial; background:#0f172a; height:100vh; display:flex; flex-direction:column; }
        header { background:#1e2937; padding:15px; text-align:center; color:#22d3ee; font-size:20px; }
        .key-area { background:#1e2937; padding:10px; text-align:center; }
        .messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; background:#0a1625; }
        .message { max-width:75%; padding:12px 16px; border-radius:18px; font-size:16px; }
        .me { align-self:flex-end; background:#22d3ee; color:#0f172a; }
        .other { align-self:flex-start; background:#1e2937; color:#e2e8f0; }
        .encrypted { font-size:0.85em; color:#94a3b8; word-break:break-all; margin-top:5px; }
        .input-area { background:#1e2937; padding:12px; display:flex; gap:10px; }
        input { flex:1; padding:14px; border-radius:30px; background:#334155; color:white; }
        button { background:#22d3ee; color:#0f172a; padding:14px 20px; border-radius:30px; font-weight:bold; cursor:pointer; }
        .decrypt-btn { background:#f472b6; color:white; padding:8px 16px; border-radius:20px; margin-top:8px; }
    </style>
</head>
<body>

<header>🔐 WhatsApp AES Sécurisé (Simulation Exposé)</header>

<div class="key-area">
    Clé secrète : 
    <input id="key" type="text" value="1234567890123456" style="width:280px; padding:8px;">
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
    <input id="messageInput" type="text" placeholder="Tape ton message ici...">
    <button onclick="sendMessage()">Chiffrer & Envoyer</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="script.js"></script>

</body>
</html>
